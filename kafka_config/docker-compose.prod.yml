services:
  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1
      interval: 5s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  kafka-producer:
    build:
      context: ../kafka_producer
      dockerfile: Dockerfile
    container_name: kafka-producer
    env_file:
      - ../.env.prod
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  pyspark-streaming:
    build:
      context: ../pyspark_streaming
      dockerfile: Dockerfile
    container_name: pyspark-streaming
    env_file:
      - ../.env.prod
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - pyspark_checkpoints:/app/checkpoints
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  db-cleanup:
    image: postgres:16-alpine
    container_name: db-cleanup
    env_file:
      - ../.env.prod
    entrypoint: /bin/sh
    command: >
      -c "while true; do
        sleep 3600;
        echo \"[$$(date)] Running cleanup...\";
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h $$POSTGRES_HOST -p $$POSTGRES_PORT -U $$POSTGRES_USER -d $$POSTGRES_DB \"sslmode=require\" -c \"SELECT cleanup_old_train_positions(INTERVAL '4 hours');\";
      done"
    restart: unless-stopped

volumes:
  pyspark_checkpoints:

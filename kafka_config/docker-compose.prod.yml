services:
  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1
      interval: 5s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4
    container_name: tfl-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tfl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tfl_password}
      POSTGRES_DB: ${POSTGRES_DB:-tfl_trains}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: pg_isready -U tfl -d tfl_trains
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  kafka-producer:
    build:
      context: ../kafka_producer
      dockerfile: Dockerfile
    container_name: kafka-producer
    env_file:
      - ../.env.prod
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  pyspark-streaming:
    build:
      context: ../pyspark_streaming
      dockerfile: Dockerfile
    container_name: pyspark-streaming
    env_file:
      - ../.env.prod
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_SSLMODE: disable
    volumes:
      - pyspark_checkpoints:/app/checkpoints
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  db-cleanup:
    image: postgres:16-alpine
    container_name: db-cleanup
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-tfl}
      PGPASSWORD: ${POSTGRES_PASSWORD:-tfl_password}
      PGDATABASE: ${POSTGRES_DB:-tfl_trains}
    entrypoint: /bin/sh
    command: >
      -c "while true; do
        sleep 3600;
        echo \"[$$(date)] Running cleanup...\";
        if pg_isready -q; then
          psql -c \"SELECT cleanup_old_train_positions(INTERVAL '1 day');\";
          psql -c \"VACUUM train_positions;\";
          echo \"[$$(date)] Cleanup complete\";
        else
          echo \"[$$(date)] postgres not reachable, skipping cleanup\";
        fi;
      done"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  pyspark_checkpoints:
